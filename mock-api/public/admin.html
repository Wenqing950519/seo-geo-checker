<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoCheck 成本監控</title>
  <style>
    :root { color-scheme:dark; font-family:Inter,"Noto Sans TC",system-ui,sans-serif; background:#07111f; color:#eaf2ff } body{max-width:1160px;margin:0 auto;padding:42px 22px 80px}h1{margin:0 0 8px}p{color:#a9b9ce}.login,.grid,.panel{border:1px solid #20334e;background:#0c192b;border-radius:16px;padding:20px}.login{display:flex;gap:10px;align-items:center;margin:24px 0}input,button{border-radius:9px;padding:10px 12px;font:inherit}input{flex:1;border:1px solid #385170;background:#07111f;color:#fff}button{border:0;background:#17b6a2;color:#04221f;font-weight:800;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:12px}.metric{background:#101f35;border-radius:12px;padding:16px}.metric b{display:block;margin-top:8px;font-size:26px;color:#42d5c3}.layout{display:grid;grid-template-columns:1fr 1.2fr;gap:18px;margin-top:18px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:10px 6px;border-bottom:1px solid #20334e}th{color:#8da2bd}.muted{color:#8da2bd}.error{color:#ff9b9b}#dashboard{display:none}@media(max-width:760px){.grid,.layout{grid-template-columns:1fr}.login{flex-wrap:wrap}}
  </style>
</head>
<body>
  <h1>GeoCheck 成本監控</h1><p>僅統計 API 用量與預估費用；不保存 API key、完整提示詞或網站內容。</p>
  <section id="login" class="login"><input id="token" type="password" autocomplete="current-password" placeholder="後台密碼" /><button id="open">進入後台</button><span id="message" class="muted"></span></section>
  <main id="dashboard"><p class="muted" id="notice"></p><section class="grid"><div class="metric">總請求<b id="requests">0</b></div><div class="metric">總 Token<b id="tokens">0</b></div><div class="metric">成功率<b id="success">0%</b></div><div class="metric">預估成本（USD）<b id="cost">--</b></div></section>
  <section class="layout"><div class="panel"><h2>供應商彙總</h2><table><thead><tr><th>模型</th><th>請求</th><th>Token</th><th>估算成本</th></tr></thead><tbody id="providers"></tbody></table></div><div class="panel"><h2>最近 API 呼叫</h2><table><thead><tr><th>時間</th><th>服務</th><th>用途</th><th>Token</th><th>狀態</th></tr></thead><tbody id="events"></tbody></table></div></section></main>
  <script>
    const $=id=>document.getElementById(id),fmt=new Intl.NumberFormat('zh-TW'),usd=n=>'$'+Number(n).toFixed(4);
    async function load(){const token=sessionStorage.getItem('geocheck_admin_token')||$('token').value;if(!token)return;$('message').textContent='讀取中…';const res=await fetch(location.pathname + '/usage',{headers:{'X-Admin-Token':token}});if(!res.ok){$('message').textContent=res.status===401?'後台密碼不正確或尚未設定。':'無法讀取用量。';$('message').className='error';return}const data=await res.json(),t=data.totals;sessionStorage.setItem('geocheck_admin_token',token);$('login').style.display='none';$('dashboard').style.display='block';$('requests').textContent=fmt.format(t.requests);$('tokens').textContent=fmt.format(t.totalTokens);$('success').textContent=t.successRate+'%';$('cost').textContent=t.costConfigured?usd(t.estimatedCostUsd):'尚未設定單價';$('notice').textContent=t.costConfigured?'費用依目前環境變數中的單價估算，請以供應商帳單為準。':'Token 已開始累積；請設定單價環境變數後，才會顯示預估成本。';$('providers').innerHTML=data.byProvider.map(x=>`<tr><td>${esc(x.provider)}<br><span class="muted">${esc(x.model)}</span></td><td>${fmt.format(x.requests)}</td><td>${fmt.format(x.totalTokens)}</td><td>${x.costConfigured?usd(x.estimatedCostUsd):'--'}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">尚無 API 用量</td></tr>';$('events').innerHTML=data.recentEvents.map(x=>`<tr><td>${new Date(x.occurredAt).toLocaleString('zh-TW')}</td><td>${esc(x.provider)}</td><td>${esc(x.operation)}</td><td>${fmt.format(x.totalTokens)}</td><td class="${x.status==='error'?'error':''}">${x.status==='success'?'成功':'失敗'}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">尚無 API 呼叫</td></tr>';$('message').textContent=''}
    function esc(v){const e=document.createElement('div');e.textContent=String(v||'');return e.innerHTML}$('open').onclick=()=>load().catch(()=>{$('message').textContent='連線失敗。';$('message').className='error'});$('token').addEventListener('keydown',e=>{if(e.key==='Enter')$('open').click()});if(sessionStorage.getItem('geocheck_admin_token'))load();
  </script>
</body></html>
